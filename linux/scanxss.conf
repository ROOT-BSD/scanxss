# НАЛАШТУВАННЯ EMAIL: виконайте  ./scanxss --setup-email
# або відредагуйте ~/.scanxss/scanxss.conf
#
# Розміщення файлу (шукається в такому порядку):
#   ./scanxss.conf              — поточна директорія
#   ~/.scanxss/scanxss.conf     — домашня директорія користувача
#   /etc/scanxss/scanxss.conf   — системний конфіг
#
# Формат: КЛЮЧ = ЗНАЧЕННЯ
# Рядки з # ігноруються

# ── Параметри SMTP сервера ───────────────────────────────────
# Підтримується будь-який SMTP сервер з STARTTLS (порт 587)
# або SSL/TLS (порт 465)

# email_enabled    = false

# SMTP сервер та порт
# smtp_host        = mail.example.com    # змінити на ваш сервер
# smtp_port        = 587

# STARTTLS (рекомендовано, порт 587)
# Для SSL/TLS (порт 465) встановіть smtp_tls = false і змініть порт
# smtp_tls         = true

# Облікові дані для автентифікації (AUTH LOGIN)
smtp_user        = scanxss@example.com
smtp_pass        = your_password

# ── Параметри відправки ──────────────────────────────────────

# Отримувачі (можна вказати кілька через кому)
email_to         = security@example.com, admin@example.com

# Відправник (якщо порожнє — використовується smtp_user)
email_from       = scanxss@example.com

# Тема листа
# Шаблон: %h = хост, %v = кількість вразливостей, %d = дата
email_subject    = [ScanXSS] Report: %h — %v vuln(s) found (%d)

# Відправляти тільки якщо знайдено вразливості (true/false)
email_only_vulns = true

# Прикріпити HTML звіт як вкладення (true/false)
email_attach_html = true

# ── Приклади налаштувань для різних серверів ────────────────
#
# Корпоративний Exchange / Office 365:
#   smtp_host = smtp.office365.com
#   smtp_port = 587
#   smtp_tls  = true
#   smtp_user = user@company.com
#   smtp_pass = password
#
# Поштовий сервер на базі Postfix/Dovecot:
#   smtp_host = mail.company.ua
#   smtp_port = 587
#   smtp_tls  = true
#   smtp_user = scanxss@company.ua
#   smtp_pass = password
#
# SendGrid:
#   smtp_host = smtp.sendgrid.net
#   smtp_port = 587
#   smtp_tls  = true
#   smtp_user = apikey
#   smtp_pass = SG.xxxxxxxx
#
# Локальний Postfix без автентифікації (корпоративна мережа):
#   smtp_host = localhost
#   smtp_port = 25
#   smtp_tls  = false
#   smtp_user =
#   smtp_pass =

# ── Параметри сканування за замовчуванням ───────────────────
# Застосовуються якщо не вказані в командному рядку

default_depth    = 3
default_rate     = 10
default_timeout  = 10
default_scope    = subdomain
default_modules  = xss,sqli,lfi,rce,ssrf

# ── Шляхи звітів ────────────────────────────────────────────
# Порожнє = стандартний шлях ../report/<host>/
report_dir       =
